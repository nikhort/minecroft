<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-Craft 3D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container"></div>

    <div id="crosshair"></div>

    <div id="hud">
        <div id="stats-bars">
            <div class="hud-row">
                <div id="health-bar" class="hud-bar"></div>
                <div id="hunger-bar" class="hud-bar"></div>
            </div>
            <div id="xp-container">
                <div id="xp-bar"></div>
                <span id="xp-text">0</span>
            </div>
        </div>
        
        <div id="hotbar-container">
            <div id="hotbar" class="inventory-grid"></div>
        </div>
    </div>

    <div id="ui-overlay" class="hidden">
        <div id="ui-window" class="minecraft-panel">
            <div id="ui-header">
                <span id="ui-title">Инвентарь</span>
            </div>
            
            <div id="ui-content">
                <div id="ui-top-player" class="ui-top-section">
                    <div id="player-preview" class="player-box">
                        <div class="player-model-placeholder">ИГРОК</div>
                    </div>
                    <div class="crafting-container">
                        <span class="crafting-label">Создание</span>
                        <div class="crafting-flex">
                            <div id="crafting-2x2" class="inventory-grid grid-2x2"></div>
                            <div class="arrow">➔</div>
                            <div id="crafting-2x2-output" class="slot empty output-slot"></div>
                        </div>
                    </div>
                </div>

                <div id="ui-top-workbench" class="ui-top-section hidden">
                    <div class="crafting-container workbench-container">
                        <span class="crafting-label">Создание</span>
                        <div class="crafting-flex">
                            <div id="crafting-3x3" class="inventory-grid grid-3x3"></div>
                            <div class="arrow">➔</div>
                            <div id="crafting-3x3-output" class="slot empty output-slot"></div>
                        </div>
                    </div>
                </div>

                <div id="player-inventory" class="inventory-grid grid-main"></div>
                <div class="separator-line"></div>
                <div id="player-inventory-hotbar" class="inventory-grid grid-main"></div>
            </div>
        </div>
    </div>

    <div id="dragged-item" class="hidden"></div>

    <div id="pause-screen" class="overlay-screen">
        <div class="menu-box">
            <h1>JS-Craft 3D</h1>
            <button id="btn-resume" class="menu-btn">Продолжить</button>
            <button id="btn-save" class="menu-btn">Сохранить мир</button>
            <div class="settings-box">
                <label>Чувствительность мыши: 
                    <input type="range" id="setting-sens" min="1" max="100" value="50">
                </label>
                <label>Дальность прорисовки (чанков): 
                    <input type="range" id="setting-render-dist" min="2" max="12" value="6">
                </label>
            </div>
        </div>
    </div>

    <div id="death-screen" class="overlay-screen hidden">
        <div class="menu-box dead">
            <h1 class="red-text">Вы погибли!</h1>
            <button id="btn-respawn" class="menu-btn">Возродиться</button>
        </div>
    </div>

    <script src="world.js"></script>
    <script src="entities.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
